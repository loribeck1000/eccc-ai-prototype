server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Clean URLs
    location ~ ^/mlops$ { rewrite ^ /mlops-platform.html last; }
    location ~ ^/data$ { rewrite ^ /data-infrastructure.html last; }
    location ~ ^/climate$ { rewrite ^ /climate-analytics.html last; }
    location ~ ^/ghg$ { rewrite ^ /ghg-analytics.html last; }
    location ~ ^/indigenous$ { rewrite ^ /indigenous-data.html last; }
    location ~ ^/weather$ { rewrite ^ /weather-ai.html last; }

    # Cache static assets
    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
